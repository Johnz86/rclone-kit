name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # The pinned uv release. Every `uses:` action reference below is pinned by
  # full commit SHA instead (with the readable tag kept in a trailing
  # comment), so this is the one version string that cannot be expressed
  # that way: it is an input value to astral-sh/setup-uv's `version:`
  # parameter, not an action reference. The Python version itself is not
  # duplicated here: every job runs `uv python install` with no argument,
  # which resolves the exact patch version pinned in `.python-version`.
  UV_VERSION: "0.11.29"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        # --all-extras pulls in boto3/sqlmodel/psycopg2-binary so the S3 and
        # database code paths (and their tests) are actually type-checked
        # and exercised here, instead of being silently skipped due to
        # missing imports. The wheel-* jobs below intentionally omit this:
        # they prove the default, minimal, extras-free install still works.
        run: uv sync --locked --all-groups --all-extras

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright src tests scripts

  tests-windows:
    name: Test (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        # --all-extras: see the same flag in the quality job above.
        run: uv sync --locked --all-groups --all-extras

      - name: Run unit tests
        run: uv run pytest tests/unit

      - name: Run integration tests
        run: uv run pytest tests/integration

  tests-linux:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        # --all-extras: see the same flag in the quality job above.
        run: uv sync --locked --all-groups --all-extras

      - name: Run unit tests
        run: uv run pytest tests/unit

      - name: Run integration tests
        run: uv run pytest tests/integration

  wheel-windows:
    name: Wheel (windows-amd64)
    needs: [quality, tests-windows]
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Cache rclone release archive
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~\AppData\Local\rclone-kit\archives
          # Invalidates automatically on any RCLONE_VERSION or digest change,
          # without duplicating either value into this workflow file.
          key: rclone-archive-windows-amd64-${{ hashFiles('src/rclone_kit/runtime/platform.py') }}

      - name: Build, verify, and smoke-test the wheel
        # scripts/build_distribution.py is the single canonical build
        # command (see docs/build_pipeline_improvements.md): it stages the
        # certified rclone artifact for this platform into an isolated
        # temporary copy of the source tree, verifies the extracted
        # executable's digest, builds exactly one wheel, runs every
        # scripts/verify_distribution.py check, installs the wheel into a
        # clean environment, and runs the bundled-executable and
        # console-script smoke tests. Nothing under
        # src/rclone_kit/assets/rclone/ is ever written in this checkout;
        # per docs/build_pipeline_improvements.md's recommended sdist
        # policy, no source distribution is built or published.
        run: uv run python scripts/build_distribution.py --target windows-amd64 --out-dir dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheel-windows-amd64
          path: dist/*.whl
          if-no-files-found: error

  wheel-linux:
    name: Wheel (linux-amd64)
    needs: [quality, tests-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Cache rclone release archive
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/rclone-kit/archives
          key: rclone-archive-linux-amd64-${{ hashFiles('src/rclone_kit/runtime/platform.py') }}

      - name: Build, verify, and smoke-test the wheel
        run: uv run python scripts/build_distribution.py --target linux-amd64 --out-dir dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheel-linux-amd64
          path: dist/*.whl
          if-no-files-found: error

  release-assembly:
    name: Release assembly
    needs: [wheel-windows, wheel-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Download every wheel artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Verify the complete, deduplicated release set
        # Re-verifies every wheel's internal consistency (already checked
        # once inside each wheel-* job) plus the cross-platform invariant
        # only visible once every wheel has been collected into one
        # directory: exactly one wheel per certified target, no duplicates,
        # nothing unrecognized.
        run: uv run python scripts/verify_distribution.py dist --require-complete-release-set

      - name: Print release digests
        run: sha256sum dist/*.whl

      - name: Upload assembled release set
        # No publish step exists yet: docs/release_process.md documents
        # this as a deliberate choice, deferred until PyPI trusted
        # publishing is registered for this project. This artifact is the
        # exact input a future publish job would consume.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-dist
          path: dist/*.whl
          if-no-files-found: error
