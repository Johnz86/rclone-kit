name: CI

on:
  push:
  pull_request:

env:
  # Single source of truth for the pinned uv release and the target Python
  # version. Update both together and let every job below reference them.
  UV_VERSION: "0.11.29"
  PYTHON_VERSION: "3.13"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        # --all-extras pulls in boto3/sqlmodel/psycopg2-binary so the S3 and
        # database code paths (and their tests) are actually type-checked
        # and exercised here, instead of being silently skipped due to
        # missing imports. The package job below intentionally omits this:
        # it proves the default, minimal, extras-free install still works.
        run: uv sync --locked --all-groups --all-extras

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright src tests scripts

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        # pwsh is available on both GitHub-hosted ubuntu-latest and
        # windows-latest runners, so no step here needs Git Bash.
        shell: pwsh
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        # --all-extras: see the same flag in the quality job above.
        run: uv sync --locked --all-groups --all-extras

      - name: Run unit tests
        run: uv run pytest tests/unit

      - name: Run integration tests
        run: uv run pytest tests/integration

  package:
    name: Package (${{ matrix.target_os }}-${{ matrix.target_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # `target_os`/`target_arch` select the certified build target passed
        # to scripts/build_distribution.py's `--target` flag (see
        # src/rclone_kit/runtime/platform.py for the full platform model).
        include:
          - runner: windows-latest
            target_os: windows
            target_arch: amd64
          - runner: ubuntu-latest
            target_os: linux
            target_arch: amd64
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Build, verify, and smoke-test the wheel
        # scripts/build_distribution.py is the single canonical build
        # command (see docs/build_pipeline_improvements.md): it stages the
        # certified rclone artifact for this matrix leg into an isolated
        # temporary copy of the source tree, verifies the extracted
        # executable's digest, builds exactly one wheel, runs every
        # scripts/verify_distribution.py check, installs the wheel into a
        # clean environment, and runs the bundled-executable and
        # console-script smoke tests. Nothing under
        # src/rclone_kit/assets/rclone/ is ever written in this checkout;
        # per docs/build_pipeline_improvements.md's recommended sdist
        # policy, no source distribution is built or published.
        run: uv run python scripts/build_distribution.py --target ${{ matrix.target_os }}-${{ matrix.target_arch }} --out-dir dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist/*.whl
          if-no-files-found: error
