name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Input to astral-sh/setup-uv, not an action reference - every `uses:`
  # below is pinned by SHA instead. Python's patch version comes from
  # .python-version, resolved separately in each job.
  UV_VERSION: "0.11.29"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        # --all-extras exercises the S3/database code paths instead of
        # silently skipping them; the wheel-* jobs omit it deliberately, to
        # prove the default extras-free install still works.
        run: uv sync --locked --all-groups --all-extras

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright _build_backend.py src tests scripts

  tests-windows:
    name: Test (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        # --all-extras: see the same flag in the quality job above.
        run: uv sync --locked --all-groups --all-extras

      - name: Run unit tests
        run: uv run pytest tests/unit

      - name: Run integration tests
        run: uv run pytest tests/integration

  tests-linux:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        # --all-extras: see the same flag in the quality job above.
        run: uv sync --locked --all-groups --all-extras

      - name: Run unit tests
        run: uv run pytest tests/unit

      - name: Run integration tests
        run: uv run pytest tests/integration

  wheel-windows:
    name: Wheel (windows-amd64)
    needs: [quality, tests-windows]
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Cache rclone release archive
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~\AppData\Local\rclone-kit\archives
          # Invalidates automatically on any RCLONE_VERSION or digest change,
          # without duplicating either value into this workflow file.
          key: rclone-archive-windows-amd64-${{ hashFiles('src/rclone_kit/runtime/platform.py') }}

      - name: Build, verify, and smoke-test the wheel
        # The single canonical build command; see its own docstring and
        # docs/implementation_and_build_pipeline.md for what it does.
        run: uv run python scripts/build_distribution.py --target windows-amd64 --out-dir dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: wheel-windows-amd64
          path: dist/*.whl
          if-no-files-found: error

  wheel-linux:
    name: Wheel (linux-amd64)
    needs: [quality, tests-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Cache rclone release archive
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.cache/rclone-kit/archives
          key: rclone-archive-linux-amd64-${{ hashFiles('src/rclone_kit/runtime/platform.py') }}

      - name: Build, verify, and smoke-test the wheel
        run: uv run python scripts/build_distribution.py --target linux-amd64 --out-dir dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: wheel-linux-amd64
          path: dist/*.whl
          if-no-files-found: error

  release-assembly:
    name: Release assembly
    needs: [wheel-windows, wheel-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Download every wheel artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Verify the complete, deduplicated release set
        # Adds the cross-platform invariant only visible once every wheel
        # is collected: exactly one per certified target, no duplicates.
        run: uv run python scripts/verify_distribution.py dist --require-complete-release-set

      - name: Print release digests
        run: sha256sum dist/*.whl

      - name: Upload assembled release set
        # This workflow never publishes - publishing to PyPI is
        # release.yaml's job, triggered by a v* tag push, not by this one.
        # See docs/release_process.md.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-dist
          path: dist/*.whl
          if-no-files-found: error
